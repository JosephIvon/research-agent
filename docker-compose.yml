services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_SETTINGS_PATH: /etc/searxng/settings.yml
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8888/}
      SEARXNG_SECRET: ${SEARXNG_SECRET:?set SEARXNG_SECRET in .env}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - research-agent-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - research-agent-network

  research-agent:
    build: .
    container_name: research-agent
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL}
      - MINIMAX_MODEL=${MINIMAX_MODEL}
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - TENCENT_CLIENT_ID=${TENCENT_CLIENT_ID:-}
      - TENCENT_APP_ID=${TENCENT_APP_ID:-}
      - TENCENT_APP_SECRET=${TENCENT_APP_SECRET}
      - MAX_RETRIES=3
      - TIMEOUT_SECONDS=60
      - MAX_FETCH_URLS=${MAX_FETCH_URLS:-10}
      - ALLOW_PRIVATE_NETWORK_URLS=${ALLOW_PRIVATE_NETWORK_URLS:-false}
      - APP_ENV=production
      - APP_HOST=0.0.0.0
      - APP_PORT=8080
      - API_MAX_BODY_BYTES=${API_MAX_BODY_BYTES:-1048576}
      - API_AUTH_TOKEN=${API_AUTH_TOKEN:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,research-agent}
      - INITIAL_ADMIN_USERNAME=${INITIAL_ADMIN_USERNAME:-admin}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-}
      # Redis 配置
      - REDIS_URL=redis://redis:6379/0
      - TASK_STORE_BACKEND=${TASK_STORE_BACKEND:-redis}
      # SearXNG 配置
      - SEARXNG_URL=http://searxng:8080
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-searxng}
      - SEARCH_TIMEOUT=${SEARCH_TIMEOUT:-15}
      - SEARCH_MAX_RESULTS=${SEARCH_MAX_RESULTS:-10}
    volumes:
      - ./output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      searxng:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - research-agent-network

  frontend:
    build: ./frontend
    container_name: research-agent-frontend
    ports:
      - "0.0.0.0:3000:80"
    restart: unless-stopped
    depends_on:
      research-agent:
        condition: service_healthy
    networks:
      - research-agent-network

networks:
  research-agent-network:
    driver: bridge
